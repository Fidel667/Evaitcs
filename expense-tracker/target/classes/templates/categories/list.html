<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Categories')}"></head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>

<main class="container">
    <div class="page-header">
        <h1>Categories</h1>
        <a class="btn btn-primary" th:href="@{/categories/new}">+ New Category</a>
    </div>

    <div th:if="${success}" class="flash success" th:text="${success}"></div>
    <div th:if="${error}" class="flash error" th:text="${error}"></div>

    <div th:if="${#lists.isEmpty(categories)}" class="empty">No categories yet.</div>

    <table th:unless="${#lists.isEmpty(categories)}" class="table">
        <thead>
            <tr><th>Name</th><th>Type</th><th>Transactions</th><th></th></tr>
        </thead>
        <tbody>
            <tr th:each="c : ${categories}">
                <td th:text="${c.name}"></td>
                <td><span th:text="${c.type}"
                          th:classappend="${c.type.name() == 'EXPENSE'} ? 'badge badge-expense' : 'badge badge-income'"></span></td>
                <td th:text="${txCounts[c.id]}"></td>
                <td class="actions">
                    <a class="btn btn-ghost" th:href="@{|/categories/${c.id}/edit|}">Edit</a>
                    <form th:action="@{|/categories/${c.id}/delete|}" method="post" class="inline"
                          onsubmit="return confirm('Delete this category?');">
                        <button type="submit" class="btn btn-danger">Delete</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
