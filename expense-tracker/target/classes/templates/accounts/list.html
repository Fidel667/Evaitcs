<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Accounts')}"></head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>

<main class="container">
    <div class="page-header">
        <h1>Accounts</h1>
        <a class="btn btn-primary" th:href="@{/accounts/new}">+ New Account</a>
    </div>

    <div th:if="${success}" class="flash success" th:text="${success}"></div>
    <div th:if="${error}" class="flash error" th:text="${error}"></div>

    <div th:if="${#lists.isEmpty(accounts)}" class="empty">No accounts yet.</div>

    <table th:unless="${#lists.isEmpty(accounts)}" class="table">
        <thead>
            <tr><th>Name</th><th>Type</th><th>Opening Balance</th><th></th></tr>
        </thead>
        <tbody>
            <tr th:each="a : ${accounts}">
                <td th:text="${a.name}"></td>
                <td th:text="${a.type}"></td>
                <td class="right"
                    th:text="'$' + ${#numbers.formatDecimal(a.openingBalance, 1, 'COMMA', 2, 'POINT')}"></td>
                <td class="actions">
                    <a class="btn btn-ghost" th:href="@{|/accounts/${a.id}/edit|}">Edit</a>
                    <form th:action="@{|/accounts/${a.id}/delete|}" method="post" class="inline"
                          onsubmit="return confirm('Delete this account?');">
                        <button type="submit" class="btn btn-danger">Delete</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
