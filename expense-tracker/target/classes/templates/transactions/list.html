<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Transactions')}"></head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>

<main class="container">
    <div class="page-header">
        <h1>Transactions</h1>
        <a class="btn btn-primary" th:href="@{/transactions/new}">+ New Transaction</a>
    </div>

    <div th:if="${success}" class="flash success" th:text="${success}"></div>

    <!-- Filter bar -->
    <form class="filter-bar" th:action="@{/transactions}" method="get">
        <div class="filter-group">
            <label>From</label>
            <input type="date" name="start" th:value="${start}">
        </div>
        <div class="filter-group">
            <label>To</label>
            <input type="date" name="end" th:value="${end}">
        </div>
        <div class="filter-group">
            <label>Category</label>
            <select name="categoryId">
                <option value="">All categories</option>
                <option th:each="c : ${categories}"
                        th:value="${c.id}"
                        th:text="${c.name}"
                        th:selected="${c.id == selectedCategoryId}"></option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Filter</button>
        <a class="btn btn-ghost" th:href="@{/transactions}">Clear</a>
    </form>

    <div th:if="${#lists.isEmpty(transactions)}" class="empty">No transactions match your filters.</div>

    <table th:unless="${#lists.isEmpty(transactions)}" class="table">
        <thead>
            <tr>
                <th>Date</th><th>Account</th><th>Category</th>
                <th>Note</th><th class="right">Amount</th><th></th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="tx : ${transactions}">
                <td th:text="${tx.occurredOn}"></td>
                <td th:text="${tx.account.name}"></td>
                <td>
                    <span th:text="${tx.category.name}"
                          th:classappend="${tx.category.type.name() == 'EXPENSE'} ? 'badge badge-expense' : 'badge badge-income'"></span>
                </td>
                <td th:text="${tx.note}"></td>
                <td class="right"
                    th:text="'$' + ${#numbers.formatDecimal(tx.amount, 1, 'COMMA', 2, 'POINT')}"></td>
                <td class="actions">
                    <a class="btn btn-ghost" th:href="@{|/transactions/${tx.id}/edit|}">Edit</a>
                    <form th:action="@{|/transactions/${tx.id}/delete|}" method="post" class="inline"
                          onsubmit="return confirm('Delete this transaction?');">
                        <button type="submit" class="btn btn-danger">Delete</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
