<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${mode == 'edit' ? 'Edit Account' : 'New Account'})}"></head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>

<main class="container">
    <h1 th:text="${mode == 'edit' ? 'Edit Account' : 'New Account'}"></h1>

    <form th:action="${mode == 'edit'} ? @{|/accounts/${accountForm.id}|} : @{/accounts}"
          th:object="${accountForm}" method="post" class="card">

        <div class="field">
            <label for="name">Name</label>
            <input type="text" id="name" th:field="*{name}" maxlength="100">
            <small class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></small>
        </div>

        <div class="field">
            <label for="type">Type</label>
            <select id="type" th:field="*{type}">
                <option value="">— select —</option>
                <option th:each="t : ${accountTypes}" th:value="${t}" th:text="${t}"></option>
            </select>
            <small class="error" th:if="${#fields.hasErrors('type')}" th:errors="*{type}"></small>
        </div>

        <div class="field">
            <label for="openingBalance">Opening Balance</label>
            <input type="number" id="openingBalance" th:field="*{openingBalance}"
                   step="0.01" min="0">
            <small class="error" th:if="${#fields.hasErrors('openingBalance')}" th:errors="*{openingBalance}"></small>
        </div>

        <div class="form-actions">
            <a class="btn btn-ghost" th:href="@{/accounts}">Cancel</a>
            <button type="submit" class="btn btn-primary"
                    th:text="${mode == 'edit' ? 'Save changes' : 'Create account'}">Save</button>
        </div>
    </form>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
